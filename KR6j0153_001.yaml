body:
  text: 大契丹國師中天竺摩竭陁國三藏法師慈賢譯曩謨婆誐嚩帝一囉嚩二合怛二合路枳也二合二鉢囉二合底三尾始瑟吒二合野四沒䭾野五婆誐嚩帝六怛你也二合他唵七哱哱八戍䭾野戍䭾野九尾戍䭾野尾戍䭾野十阿娑麼娑麼三滿哆十一嚩婆娑十二娑頗囉拏十三誐帝賀曩十四誐誐曩十五娑嚩二合婆嚩尾秫弟十六阿鼻詵散覩𤚥十七囉嚩二合怛他誐哆素誐哆十八嚩囉嚩佐曩十九阿蜜㗚二合哆鼻曬罽二十摩賀母怛囉二合二十一滿怛囉二合鉢帶二十二唵阿賀囉阿賀囉二十三阿𢈔散䭾囉抳二十四戍䭾野戍䭾野二十五誐誐曩娑嚩二合婆嚩尾秫弟二十六鄔瑟膩二合灑二十七尾惹野二十八跛哩戍弟二十九娑賀娑囉二合囉濕銘二合散祖帝三十囉嚩二合怛他誐哆三十一嚩路枳抳三十二囉嚩二合怛他誐哆麼帝三十三察囉波囉蜜哆三十四鉢哩布囉抳三十五捺娑布銘三十六鉢囉二合帝瑟恥二合地三十七囉嚩二合怛他誐哆三十八𠶹哩二合娜野三十九地瑟姹二合曩四十地瑟恥二合地四十一唵母底哩二合母底哩二合摩賀母底哩二合四十二嚩日囉二合迦野四十三僧賀跢曩四十四跛哩秫弟四十五囉嚩二合迦哩麼二合四十六嚩囉拏尾秫弟四十七鉢囉二合底𩕳嚩哩哆二合四十八野欲尾秫弟四十九唵母𩕳母𩕳摩賀母𩕳五十阿母𩕳母𩕳五十一尾母𩕳尾母𩕳摩賀尾母𩕳五十二麼底麼底摩賀麼底五十三怛他部跢句致五十四跛哩秫弟五十五尾普二合吒五十六尾秫弟五十七唵呬呬惹野惹野摩賀惹野五十八三麼囉三麼囉五十九娑普二合囉娑普二合囉六十囉嚩二合沒䭾六十一地瑟吒二合曩地瑟恥二合底六十二秫弟秫弟六十三嚩日哩二合嚩日哩二合摩賀嚩日哩二合六十四阿嚩日哩二合六十五嚩日囉二合哩陛二合六十六惹野哩陛二合六十七尾惹野哩陛二合六十八嚩日囉二合入嚩二合攞哩陛二合六十九嚩日嚕二合底七十嚩日嚕二合婆尾七十一嚩日囉二合三婆尾七十二嚩日哩二合嚩日哩二合抳七十三嚩日𫬠二合婆嚩覩七十四麼麼哩𠻴七十五囉嚩二合怛嚩二合喃七十六迦野跛哩秫弟瑟佐七十七婆嚩覩銘跢七十八囉嚩二合誐底七十九跛哩秫弟瑟佐八十囉嚩二合怛他誐哆八十一三麼娑嚩二合娑瑟恥二合帝八十二囉嚩二合怛他誐哆瑟佐忙八十三三麼娑嚩二合娑野覩八十四唵悉𠆙悉𠆙八十五沒𠆙沒𠆙八十六尾戍䭾野尾戍䭾野八十七尾䭾野尾䭾野八十八母左母左尾母左八十九戍䭾野戊䭾野九十尾戍䭾野尾戍䭾野九十一三滿跢跛哩母左野九十二三滿怛囉二合室銘二合九十三跛哩秫第九十四囉嚩二合怛他誐哆九十五𠶹哩二合那野九十六地瑟吒二合曩九十七地瑟恥二合底九十八唵母底哩二合摩賀母底哩二合九十九滿怛囉二合鉢跢瑟恥二合底娑嚩二合賀引一百
